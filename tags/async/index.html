      var root = document.documentElement;
      var btn  = document.getElementById('theme-toggle');
      var hlL  = document.getElementById('hl-light');
      var hlD  = document.getElementById('hl-dark');
      var mql  = window.matchMedia('(prefers-color-scheme: dark)');

      function userChose() {
        try {
          var v = sessionStorage.getItem('theme');
          return v === 'light' || v === 'dark';
        } catch (_) { return false; }
      }

      function applyHighlight() {
        var t = root.getAttribute('data-theme');
        if (hlL) hlL.disabled = (t !== 'light');
        if (hlD) hlD.disabled = (t !== 'dark');
      }

      function setTheme(t, persist) {
        root.setAttribute('data-theme', t);
        if (persist) {
          try { sessionStorage.setItem('theme', t); } catch (_) {}
        }
        applyHighlight();
      }

      // Initial sync.
      applyHighlight();

      if (btn) {
        btn.addEventListener('click', function () {
          var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          setTheme(next, true);
        });
      }

      // Follow OS until the user makes a manual choice.
      if (mql.addEventListener) {
        mql.addEventListener('change', function (e) {
          if (!userChose()) setTheme(e.matches ? 'dark' : 'light', false);
        });
      }
    })();</script>
