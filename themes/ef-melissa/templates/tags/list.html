{% extends "base.html" %}

{% block title %}Tags &middot; {{ config.title }}{% endblock %}

{% block content %}
<h1>Tags</h1>
<ul class="post-list">
  {% for term in terms %}
    <li>
      <time>{{ term.pages | length }} post{% if term.pages | length != 1 %}s{% endif %}</time>
      <a href="{{ term.permalink }}">#{{ term.name }}</a>
    </li>
  {% endfor %}
</ul>
{% endblock %}
