{% extends "base.html" %}
{% import "macros.html" as macros %}

{% block title %}Tags &middot; {{ config.title }}{% endblock %}

{% block content %}
<h1>Tags</h1>
<ul class="post-list">
  {% for term in terms %}
    <li>
      <time>{{ macros::post_count(count=term.pages | length) }}</time>
      <a href="{{ term.permalink }}">#{{ term.name }}</a>
    </li>
  {% endfor %}
</ul>
{% endblock %}
