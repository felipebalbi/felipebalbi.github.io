# Theme metadata, per
# https://www.getzola.org/documentation/themes/creating-a-theme/

name = "ef-melissa"
description = "Warm, generous-whitespace blog theme inspired by Protesilaos Stavrou's ef-melissa-light / ef-melissa-dark Emacs themes. Self-hosted Aporetic Serif/Sans/Mono fonts. Light/dark switcher that follows the OS by default."
license = "MIT"
homepage = "https://github.com/felipebalbi/felipebalbi.github.io"
min_version = "0.22.0"

[author]
name = "Felipe Balbi"
homepage = "https://balbi.sh"

# The theme expects:
#
#   config.toml:
#     theme = "ef-melissa"
#     [extra]
#     author  = "..."   (optional; falls back to config.title)
#     github  = "..."   (optional)
#     nav     = [ { name = "...", url = "/..." }, ... ]
#
# Each visit starts in OS-follow mode (prefers-color-scheme
# is resolved before paint by an inline head script). The
# header toggle flips between light and dark; the choice is
# stored in sessionStorage so it survives navigation and F5
# within the tab, and resets when the tab is closed.
#
# The theme also expects the site to use class-based syntax
# highlighting so the light/dark code stylesheets can be swapped
# at runtime:
#
#     [markdown.highlighting]
#     enabled     = true
#     highlight_code = true        # Zola < 0.20 compatibility
#     style       = "class"
#     light_theme = "solarized-light"
#     dark_theme  = "solarized-dark"
#
[extra]
