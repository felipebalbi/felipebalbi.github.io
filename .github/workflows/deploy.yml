name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '10 8 * * *'      # daily 08:10 UTC — tune to your preferred publish hour

concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: write   # needed to push to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      # Publish any post whose `date` has arrived: flip `draft = true` -> `false`
      # (scripts/publish-due.py), then persist that flip back to main so later
      # normal builds keep the post live. Flip + build + deploy run in this one
      # job because a GITHUB_TOKEN push does not re-trigger workflows.
      - name: Publish posts due today
        id: publish
        run: python3 scripts/publish-due.py

      - name: Commit flipped drafts back to main
        if: steps.publish.outputs.changed == 'true'
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "publish: posts due on $(date -u +%Y-%m-%d)"
          git push origin HEAD:main

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar -xz -C /usr/local/bin
          zola --version

      - name: Build site
        run: zola build

      # Layer the legacy paths from main on top of Zola's output:
      #
      #   - pico-de-gallo/  is published into main by the
      #     OpenDevicePartnership/pico-de-gallo deploy workflow. Copy the
      #     directory verbatim so /pico-de-gallo/ keeps working.
      #
      #   - CNAME tells GitHub Pages our custom domain. We also keep a
      #     copy in static/ so Zola alone would publish it, but copying
      #     it explicitly here makes the contract obvious.
      #
      #   - .nojekyll prevents GitHub Pages from running Jekyll on the
      #     output (we don't need it, and Jekyll would skip files that
      #     start with an underscore).
      - name: Layer preserved paths into build output
        run: |
          set -eu
          if [ -d pico-de-gallo ]; then
            cp -r pico-de-gallo public/pico-de-gallo
          fi
          if [ -f CNAME ]; then
            cp CNAME public/CNAME
          fi
          touch public/.nojekyll
          echo "---- public/ root ----"
          ls -la public/
          echo "---- pico-de-gallo present? ----"
          ls public/pico-de-gallo | head -5

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: '41898282+github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: build site from ${{ github.sha }}'
