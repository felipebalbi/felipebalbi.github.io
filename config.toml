base_url = "https://balbi.sh"
title = "Felipe Balbi"
description = "Notes on embedded systems, Rust, and the craft of writing software."
default_language = "en"
compile_sass = true
minify_html = true
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]
build_search_index = false
author = "Felipe Balbi"
theme = "ef-melissa"

taxonomies = [
  { name = "tags", feed = true },
]

[markdown]
smart_punctuation = true
bottom_footnotes = true

# Class-based highlighting so the light + dark stylesheets can
# be swapped at runtime by the ef-melissa theme switcher.
# Zola emits static/giallo-light.css + static/giallo-dark.css.
[markdown.highlighting]
enabled = true
style = "class"
light_theme = "solarized-light"
dark_theme  = "solarized-dark"

[extra]
tagline = "Embedded systems · Rust · the craft of writing software"
github = "https://github.com/felipebalbi"
mastodon = ""
email = ""
nav = [
  { name = "Posts", url = "/posts/" },
  { name = "Pico de Gallo Book", url = "/pico-de-gallo/" },
]
